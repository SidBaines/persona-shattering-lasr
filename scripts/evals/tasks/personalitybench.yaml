task: personalitybench
include: _personalitybench_defaults.yaml
process_results: !function utils.process_results_personalitybench
metric_list:
  - metric: personalitybench.soft_mae
    aggregation: mean
    higher_is_better: false
  - metric: personalitybench.soft_rmse_sq
    aggregation: !function utils.agg_sqrt_mean
    higher_is_better: false
  - metric: personalitybench.hard_score
    aggregation: mean
    higher_is_better: true
  - metric: personalitybench.parse_ok
    aggregation: mean
    higher_is_better: true
  - metric: personalitybench.EI.mae
    aggregation: mean
    higher_is_better: false
  - metric: personalitybench.SN.mae
    aggregation: mean
    higher_is_better: false
  - metric: personalitybench.TF.mae
    aggregation: mean
    higher_is_better: false
  - metric: personalitybench.JP.mae
    aggregation: mean
    higher_is_better: false
  - metric: personalitybench.EI.rmse_sq
    aggregation: !function utils.agg_sqrt_mean
    higher_is_better: false
  - metric: personalitybench.SN.rmse_sq
    aggregation: !function utils.agg_sqrt_mean
    higher_is_better: false
  - metric: personalitybench.TF.rmse_sq
    aggregation: !function utils.agg_sqrt_mean
    higher_is_better: false
  - metric: personalitybench.JP.rmse_sq
    aggregation: !function utils.agg_sqrt_mean
    higher_is_better: false
  - metric: personalitybench.EI.hard_acc
    aggregation: mean
    higher_is_better: true
  - metric: personalitybench.SN.hard_acc
    aggregation: mean
    higher_is_better: true
  - metric: personalitybench.TF.hard_acc
    aggregation: mean
    higher_is_better: true
  - metric: personalitybench.JP.hard_acc
    aggregation: mean
    higher_is_better: true
